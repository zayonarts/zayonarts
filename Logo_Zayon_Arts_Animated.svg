<svg xmlns="http://www.w3.org/2000/svg" viewBox="-10 -10 265.91 334.53" width="120" height="150">
  <style>
    .outer {
      transform-origin: 122.95px 157.26px;
      animation: outerDraw 3.5s cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
      fill: none;
      stroke: #B6FF00;
      stroke-width: 1.5;
      stroke-dasharray: 1800;
      stroke-dashoffset: 1800;
    }
    .inner {
      fill: #B6FF00;
      transform-origin: 122.95px 157.26px;
      clip-path: inset(100% 0 0 0);
      animation: reveal 1.4s cubic-bezier(0.33, 0, 0.2, 1) 2.4s forwards,
                 breathe 4s ease-in-out 3.8s infinite;
    }
    .ghost {
      fill: none;
      stroke: #B6FF00;
      stroke-width: 0.5;
      opacity: 0;
      transform-origin: 122.95px 157.26px;
      animation: ghostPulse 4s ease-in-out 3.8s infinite;
    }
    @keyframes outerDraw {
      to { stroke-dashoffset: 0; }
    }
    @keyframes reveal {
      0% { clip-path: inset(100% 0 0 0); }
      100% { clip-path: inset(0% 0 0 0); }
    }
    @keyframes breathe {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }
    @keyframes ghostPulse {
      0%   { opacity: 0.8; transform: scale(1); }
      12%  { opacity: 0; transform: scale(1.08); }
      20%  { opacity: 0; transform: scale(1); }
      25%  { opacity: 0.8; transform: scale(1); }
      37%  { opacity: 0; transform: scale(1.08); }
      50%  { opacity: 0; transform: scale(1); }
      100% { opacity: 0; transform: scale(1); }
    }
  </style>
